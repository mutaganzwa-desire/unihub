name: unihub
description: A platform connecting university students with student-led startups for internships and practical experience.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # State management & DI
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10

  # Utilities
  intl: ^0.19.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
